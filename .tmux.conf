# ============================================
# ESSENTIAL SETTINGS
# ============================================

# Rebind default prefix key
set-option -g prefix C-o
unbind C-b

# Fix Vim ESC delay
set -sg escape-time 0

# Increase scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse off

# Enable focus events for vim autoread
set -g focus-events on

# Set terminal with proper colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Aggressive resize for multi-client
setw -g aggressive-resize on

# Send mouse selection to system clipboard
set -s copy-command 'xsel -b'

# ============================================
# KEY BINDINGS (inspired by byobu)
# ============================================

bind-key -n F2 new-window -c "#{pane_current_path}"
bind-key -n C-F1 display-panes \; split-window -h -c "#{pane_current_path}"
bind-key -n C-F2 display-panes \; split-window -v -c "#{pane_current_path}"
bind-key -n F3 previous-window
bind-key -n F4 next-window
bind-key -n S-F3 swap-window -t :-1
bind-key -n S-F4 swap-window -t :+1
bind-key -n M-F3 display-panes \; select-pane -t :.-
bind-key -n M-F4 display-panes \; select-pane -t :.+
bind-key -n C-F3 display-panes \; swap-pane -s :. -t :.- \; select-pane -t :.-
bind-key -n C-F4 display-panes \; swap-pane -s :. -t :.+ \; select-pane -t :.+
bind-key -n C-k resize-pane -U
bind-key -n C-j resize-pane -D
bind-key -n C-h resize-pane -L
bind-key -n C-l resize-pane -R
bind-key -n F6 detach
bind-key -n C-F6 kill-pane
bind-key -n F7 copy-mode
bind-key -n F8 command-prompt -p "(rename-window) " "rename-window '%%'"
bind-key -n C-F8 command-prompt -p "(rename-session) " "rename-session '%%'"
bind-key -n M-F8 next-layout
bind-key -n F9 display-panes \; setw synchronize-panes
bind-key -n F10 choose-tree
bind-key -n M-F10 break-pane
bind-key -n C-F10 join-pane -h -s :. -t :-1
bind-key -n S-F11 resize-pane -Z

# ============================================
# APPEARANCE
# ============================================

# Status bar position
set -g status-position bottom

# Status bar colors
set -g status-style 'bg=#13161d fg=#8b949e'
set -g status-left-length 20
set -g status-right-length 100

# Status bar content
set -g status-left '#[fg=#00e68a,bold] #S #[fg=#30363d]│#[fg=#00e68a,bold] #H #[fg=#30363d]│'
set -g status-right "#[fg=#30363d]│#[fg=#8b949e] up #(~/bin/tmux_up.sh) #[fg=#30363d]│#[fg=#8b949e]#(~/bin/tmux_ips.sh)"

# Window status
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format '#[fg=#00e68a,bold] #I:#W '

# Pane border colors
set -g pane-border-style 'fg=#30363d'
set -g pane-active-border-style 'fg=#00e68a'

# Message styling
set -g message-style 'bg=#00e68a fg=#000000 bold'

# Automatic renaming
set-option -g status-interval 1
set-option -g automatic-rename on
# set-option -g automatic-rename-format '#{pane_current_path}'
set-option -g automatic-rename-format '#{pane_title}'

# ============================================
# COPY MODE
# ============================================

# Use vi keys
setw -g mode-keys vi

# Vi-style copy bindings
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -i"  # Linux

# ============================================
# PLUGINS (via TPM)
# ============================================
